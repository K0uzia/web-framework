<section class="section-blog section-blog--blog7 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-blog__container section-blog__container--blog7">
        <div class="section-blog__head section-blog__head--blog7">
            <span class="section-blog__badge--blog7">{{content_tagline}}</span>
            <h2 class="section-blog__title section-blog__title--blog7">{{content_title}}</h2>
            <p class="section-blog__subtitle section-blog__subtitle--blog7">{{content_subtitle}}</p>
        </div>
        <div class="section-blog__grid section-blog__grid--blog7">
            {{{blog_posts_html}}}
        </div>
    </div>
</section>
