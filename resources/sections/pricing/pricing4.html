<section class="section-pricing section-pricing--pricing4 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}" data-pricing-billing>
    <div class="section-pricing__container">
        <div class="section-pricing__header section-pricing__header--split">
            <div class="section-pricing__header-copy">
                <h2 class="section-pricing__title section-pricing__title--left">{{content_title}}</h2>
                <p class="section-pricing__subtitle section-pricing__subtitle--left">{{content_subtitle}}</p>
            </div>
            {{{pricing_billing_html}}}
        </div>
        <div class="section-pricing__grid section-pricing__grid--plan4">{{{pricing_plans_html}}}</div>
    </div>
</section>
