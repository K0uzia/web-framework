<section class="section-pricing section-pricing--pricing2 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}" data-pricing-billing>
    <div class="section-pricing__container">
        <div class="section-pricing__intro section-pricing__intro--center">
            <h2 class="section-pricing__title">{{content_title}}</h2>
            <p class="section-pricing__subtitle">{{content_subtitle}}</p>
        </div>
        <div class="section-pricing__billing-wrap">{{{pricing_billing_html}}}</div>
        <div class="section-pricing__grid section-pricing__grid--plan2">{{{pricing_plans_html}}}</div>
    </div>
</section>
