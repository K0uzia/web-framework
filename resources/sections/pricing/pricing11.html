<section class="section-pricing section-pricing--pricing11 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}" data-pricing-billing>
    <div class="section-pricing__container section-pricing__container--matrix">
        <div class="section-pricing__matrix-intro">
            <h2 class="section-pricing__title section-pricing__title--left">{{content_title}}</h2>
            <p class="section-pricing__subtitle section-pricing__subtitle--left">{{content_subtitle}}</p>
        </div>
        <div class="section-pricing__matrix-sticky">
            <div class="section-pricing__matrix-header">
                <div class="section-pricing__matrix-billing">
                    <span class="section-pricing__matrix-billing-label">Facturation</span>
                    {{{pricing_billing_html}}}
                </div>
                <div class="section-pricing__matrix-plans">{{{pricing_plans_html}}}</div>
            </div>
        </div>
        {{{pricing_matrix_html}}}
    </div>
</section>
