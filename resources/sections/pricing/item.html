<article class="section-pricing__card">
    <h3 class="section-pricing__name">{{title}}</h3>
    <p class="section-pricing__price">{{price}}<span class="section-pricing__period">{{period}}</span></p>
    <p class="section-pricing__desc">{{text}}</p>
    <ul class="section-pricing__list">{{{list_lines_html}}}</ul>
    <div class="section-pricing__cta">{{{cta_html}}}</div>
</article>
