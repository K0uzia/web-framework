<figure class="section-community__card">
    <blockquote class="section-community__quote"><p>{{text}}</p></blockquote>
    <figcaption class="section-community__author">
        <span class="section-community__avatar" aria-hidden="true">{{initials}}</span>
        <span class="section-community__meta">
            <span class="section-community__name">{{title}}</span>
            <span class="section-community__role">{{role}}</span>
        </span>
    </figcaption>
</figure>
