<section class="section-community section-community--community1 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-community__container--community1">
        <div class="section-community__inner--community1">
            {{{community_logo_html}}}
            <h2 class="section-community__title--community1">
                {{content_title}}<br />
                <span class="section-community__highlight--community1">{{content_subtitle}}</span>
            </h2>
            <div class="section-community__socials--community1">
                {{{community_social_html}}}
            </div>
        </div>
    </div>
</section>
