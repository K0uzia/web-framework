<section class="section-services section-services--services12 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-services__container--services12">
        <div class="section-services__layout--services12">
            <div class="section-services__aside--services12">
                <h2 class="section-services__title--services12">{{content_title}}</h2>
                <p class="section-services__subtitle--services12">{{content_subtitle}}</p>
                <div class="section-services__buttons--services12">{{{buttons_html}}}</div>
            </div>
            <div class="section-services__cards--services12">
                <div class="section-services__featured--services12">
                    {{{services_featured_html}}}
                </div>
                <div class="section-services__secondary--services12">
                    {{{services_secondary_html}}}
                </div>
            </div>
        </div>
    </div>
</section>
