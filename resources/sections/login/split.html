<section class="section-login section-login--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-login__grid">
        <div class="section-login__text">
            <h2 class="section-login__title">{{content_title}}</h2>
            <p class="section-login__subtitle">{{content_subtitle}}</p>
            <div class="section-login__body">{{{text_paragraphs_html}}}</div>
        </div>
        <ul class="section-login__points">
            {{{items_html}}}
        </ul>
    </div>
</section>
