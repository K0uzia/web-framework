<section class="section-content section-content--quote section--align-{{style_text_align}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-inner--narrow">
        <figure class="section-content__quote">
            <blockquote class="section-content__quote-text">{{{text_paragraphs_html}}}</blockquote>
            <figcaption class="section-content__quote-author">{{content_title}}</figcaption>
        </figure>
    </div>
</section>
