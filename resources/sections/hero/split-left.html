<section class="section-hero section-hero--split-left section--align-{{style_text_align}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-hero__inner section-hero__inner--split">
        <div class="section-hero__visual">{{{hero_visual_html}}}</div>
        <div class="section-hero__copy">
            <h1>{{content_title}}</h1>
            <p class="section-hero__subtitle">{{content_subtitle}}</p>
            <div class="section-buttons">{{{buttons_html}}}</div>
        </div>
    </div>
</section>
