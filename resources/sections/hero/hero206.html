<section class="section-hero section-hero--hero206 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-hero__grid-bg" aria-hidden="true"></div>
    <div class="section-hero__container section-hero__container--relative">
        <header class="section-hero__head section-hero__head--center">
            <h1 class="section-hero__title">{{content_title}}</h1>
            <p class="section-hero__subtitle">{{content_subtitle}}</p>
        </header>
        {{{hero_marquee_html}}}
        <div class="section-hero__browser-wrap">
            {{{hero_browser_html}}}
            <div class="section-hero__browser-fade" aria-hidden="true"></div>
        </div>
    </div>
</section>
