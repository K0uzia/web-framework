<section class="section-hero section-hero--hero34 section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-hero__container">
        <div class="section-hero__card">
            <div class="section-hero__card-copy">
                {{{hero_badge_html}}}
                <h1 class="section-hero__title">{{content_title}}</h1>
                <p class="section-hero__subtitle">{{content_subtitle}}</p>
                <div class="section-hero__buttons">{{{hero_buttons_html}}}</div>
            </div>
            <div class="section-hero__card-visual">{{{hero_visual_html}}}</div>
        </div>
    </div>
</section>
