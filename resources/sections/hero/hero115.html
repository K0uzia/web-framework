<section class="section-hero section-hero--hero115 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-hero__container section-hero__container--showcase">
        <div class="section-hero__stack">
            <div class="section-hero__decor section-hero__decor--showcase">
                {{{hero_rings_html}}}
                {{{hero_icon_html}}}
                <h1 class="section-hero__title section-hero__title--showcase">{{content_title}}</h1>
                <p class="section-hero__subtitle section-hero__subtitle--showcase">{{content_subtitle}}</p>
                <div class="section-hero__cta section-hero__cta--showcase">
                    {{{hero_buttons_html}}}
                    <p class="section-hero__byline section-hero__byline--showcase">{{content_byline}}</p>
                </div>
            </div>
            {{{hero_visual_html}}}
        </div>
    </div>
</section>
