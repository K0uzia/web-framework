<section class="section-hero section-hero--fullscreen {{{hero_modifiers}}} {{{hero_backdrop_class}}} section--align-{{style_text_align}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    {{{hero_backdrop_html}}}
    <div class="section-hero__inner section-hero__inner--fullscreen">
        <h1>{{content_title}}</h1>
        <p class="section-hero__subtitle">{{content_subtitle}}</p>
        <div class="section-buttons">{{{buttons_html}}}</div>
    </div>
    <script src="/assets/js/sections/hero-video.js" defer></script>
</section>
