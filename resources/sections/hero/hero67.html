<section class="section-hero section-hero--hero67 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-hero__container section-hero__container--banner">
        <div class="section-hero__top section-hero__top--banner">
            {{{hero_logo_html}}}
            <div class="section-hero__intro section-hero__intro--banner">
                <h1 class="section-hero__title section-hero__title--banner">{{content_title}}</h1>
                <p class="section-hero__subtitle section-hero__subtitle--banner">{{content_subtitle}}</p>
            </div>
            <div class="section-hero__cta-row section-hero__cta-row--banner">
                <div class="section-hero__buttons section-hero__buttons--banner">{{{hero_buttons_html}}}</div>
                {{{hero_trust_html}}}
            </div>
        </div>
        {{{hero_banner_html}}}
    </div>
</section>
