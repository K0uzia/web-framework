<section class="section-hero section-hero--hero3 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-hero__container">
        <div class="section-hero__grid">
            <div class="section-hero__copy">
                <h1 class="section-hero__title">{{content_title}}</h1>
                <p class="section-hero__subtitle">{{content_subtitle}}</p>
                {{{hero_reviews_html}}}
                <div class="section-hero__buttons">{{{hero_buttons_html}}}</div>
            </div>
            <div class="section-hero__visual">{{{hero_visual_html}}}</div>
        </div>
    </div>
</section>
