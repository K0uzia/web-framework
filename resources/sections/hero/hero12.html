<section class="section-hero section-hero--hero12 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    {{{hero_pattern_html}}}
    <div class="section-hero__container section-hero__container--relative">
        <div class="section-hero__stack">
            {{{hero_logo_html}}}
            <h1 class="section-hero__title">{{content_title}}</h1>
            <p class="section-hero__subtitle">{{content_subtitle}}</p>
            <div class="section-hero__buttons section-hero__buttons--center">{{{hero_buttons_html}}}</div>
            <div class="section-hero__tech-block">
                <p class="section-hero__tech-label">Construit avec des technologies open source</p>
                {{{hero_logos_html}}}
            </div>
        </div>
    </div>
</section>
