<section class="section-hero section-hero--hero78 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    {{{hero_backdrop_html}}}
    <div class="section-hero__overlay" aria-hidden="true"></div>
    {{{hero_noise_html}}}
    <div class="section-hero__container section-hero__container--overlay">
        <h1 class="section-hero__title section-hero__title--light">{{content_title}}</h1>
        <p class="section-hero__subtitle section-hero__subtitle--light">{{content_subtitle}}</p>
        <div class="section-hero__buttons section-hero__buttons--center">{{{hero_buttons_html}}}</div>
    </div>
</section>
