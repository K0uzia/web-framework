<section class="section-hero section-hero--hero243 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-hero__container section-hero__container--framed">
        <div class="section-hero__frame section-hero__frame--top">
            <p class="section-hero__eyebrow"><span class="section-hero__eyebrow-dot" aria-hidden="true"></span> {{content_badge}}</p>
            {{{hero_flip_html}}}
        </div>
        <div class="section-hero__frame section-hero__frame--mid">
            <p class="section-hero__subtitle section-hero__subtitle--center">{{content_subtitle}}</p>
            <div class="section-hero__buttons section-hero__buttons--center">{{{hero_buttons_html}}}</div>
        </div>
        {{{hero_features_html}}}
    </div>
</section>
