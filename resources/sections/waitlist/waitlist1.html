<section class="section-waitlist section-waitlist--waitlist1 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-waitlist__backdrop--waitlist1" aria-hidden="true">
        {{{waitlist_background_html}}}
    </div>
    <div class="section-waitlist__container--waitlist1">
        <div class="section-waitlist__content--waitlist1">
            <h2 class="section-waitlist__title--waitlist1">{{content_title}}</h2>
            <p class="section-waitlist__subtitle--waitlist1">{{content_subtitle}}</p>
            {{{waitlist_form_html}}}
            <div class="section-waitlist__proof--waitlist1">
                {{{waitlist_avatars_html}}}
                <p class="section-waitlist__proof-text--waitlist1">{{content_tagline}}</p>
            </div>
        </div>
    </div>
</section>
