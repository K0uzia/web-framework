<section class="section-timeline section-timeline--timeline3 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-timeline__container--timeline3">
        <div class="section-timeline__layout--timeline3">
            <div class="section-timeline__aside--timeline3">
                <h2 class="section-timeline__title--timeline3">{{content_title}}</h2>
                <p class="section-timeline__subtitle--timeline3">{{content_subtitle}}</p>
                <div class="section-timeline__buttons--timeline3">{{{buttons_html}}}</div>
            </div>
            <div class="section-timeline__entries--timeline3">
                {{{timeline_entries_html}}}
            </div>
        </div>
    </div>
</section>
