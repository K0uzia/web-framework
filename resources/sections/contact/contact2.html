<section class="section-contact section-contact--contact2 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-contact__container">
        <div class="section-contact__split">
            <div class="section-contact__aside">
                <div class="section-contact__intro">
                    <h2 class="section-contact__title section-contact__title--hero">{{content_title}}</h2>
                    <p class="section-contact__subtitle section-contact__subtitle--hero">{{content_subtitle}}</p>
                </div>
                <div class="section-contact__links">{{{contact_links_html}}}</div>
            </div>
            <div class="section-contact__form-wrap">
                <div class="section-contact__form-panel">
                    <div class="section-contact__form-head">
                        <h3 class="section-contact__form-title">{{content_form_heading}}</h3>
                        <p class="section-contact__form-subtitle">{{content_form_subheading}}</p>
                    </div>
                    {{{contact_form_html}}}
                </div>
            </div>
        </div>
    </div>
</section>
