<section class="section-contact section-contact--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-contact__grid">
        <div class="section-contact__text">
            <h2 class="section-contact__title">{{content_title}}</h2>
            <p class="section-contact__subtitle">{{content_subtitle}}</p>
            <div class="section-contact__body">{{{text_paragraphs_html}}}</div>
        </div>
        <ul class="section-contact__points">
            {{{items_html}}}
        </ul>
    </div>
</section>
