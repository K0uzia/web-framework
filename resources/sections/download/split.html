<section class="section-download section-download--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-download__grid">
        <div class="section-download__text">
            <h2 class="section-download__title">{{content_title}}</h2>
            <p class="section-download__subtitle">{{content_subtitle}}</p>
            <div class="section-download__body">{{{text_paragraphs_html}}}</div>
        </div>
        <ul class="section-download__points">
            {{{items_html}}}
        </ul>
    </div>
</section>
