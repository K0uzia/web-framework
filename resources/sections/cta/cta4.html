<section class="section-cta section-cta--cta4 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-cta__container--cta4">
        <div class="section-cta__card--cta4">
            <div class="section-cta__main--cta4">
                <h2 class="section-cta__title--cta4">{{content_title}}</h2>
                <p class="section-cta__subtitle--cta4">{{content_subtitle}}</p>
                <div class="section-cta__buttons--cta4">
                    {{{buttons_html}}}
                </div>
            </div>
            <div class="section-cta__aside--cta4">
                {{{cta_features_html}}}
            </div>
        </div>
    </div>
</section>
