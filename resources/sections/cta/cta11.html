<section class="section-cta section-cta--cta11 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-cta__container--cta11">
        <div class="section-cta__card--cta11">
            {{{cta_image_html}}}
            <div class="section-cta__body--cta11">
                <div class="section-cta__head--cta11">
                    {{{cta_badge_html}}}
                    <h2 class="section-cta__title--cta11">{{content_title}}</h2>
                </div>
                <p class="section-cta__subtitle--cta11">{{content_subtitle}}</p>
                <div class="section-cta__buttons--cta11">
                    {{{buttons_html}}}
                </div>
            </div>
        </div>
    </div>
</section>
