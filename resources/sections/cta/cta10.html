<section class="section-cta section-cta--cta10 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-cta__container--cta10">
        <div class="section-cta__panel--cta10">
            <div class="section-cta__content--cta10">
                <h2 class="section-cta__title--cta10">{{content_title}}</h2>
                <p class="section-cta__subtitle--cta10">{{content_subtitle}}</p>
            </div>
            <div class="section-cta__buttons--cta10">
                {{{buttons_html}}}
            </div>
        </div>
    </div>
</section>
