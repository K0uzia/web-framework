<section class="section-cta section-cta--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-cta__grid">
        <div class="section-cta__text">
            <h2 class="section-cta__title">{{content_title}}</h2>
            <p class="section-cta__subtitle">{{content_subtitle}}</p>
            <div class="section-cta__body">{{{text_paragraphs_html}}}</div>
        </div>
        <ul class="section-cta__points">
            {{{items_html}}}
        </ul>
    </div>
</section>
