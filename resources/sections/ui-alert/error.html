<section class="section-ui-alert section-ui-alert--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-inner--narrow">
        <div class="section-ui-alert__box" role="alert">
            <p class="section-ui-alert__title">{{content_title}}</p>
            <p class="section-ui-alert__text">{{content_text}}</p>
        </div>
    </div>
</section>
