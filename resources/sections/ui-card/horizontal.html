<section class="section-ui-card section-ui-card--horizontal section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner">
        <article class="section-ui-card__box section-ui-card__box--horizontal">
            <div>
                <h3>{{content_title}}</h3>
                <p>{{content_subtitle}}</p>
            </div>
            <div class="section-buttons">{{{buttons_html}}}</div>
        </article>
    </div>
</section>
