<section class="section-case-studies section-case-studies--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-case-studies__grid">
        <div class="section-case-studies__text">
            <h2 class="section-case-studies__title">{{content_title}}</h2>
            <p class="section-case-studies__subtitle">{{content_subtitle}}</p>
            <div class="section-case-studies__body">{{{text_paragraphs_html}}}</div>
        </div>
        <ul class="section-case-studies__points">
            {{{items_html}}}
        </ul>
    </div>
</section>
