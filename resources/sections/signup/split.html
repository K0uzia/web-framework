<section class="section-signup section-signup--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-signup__grid">
        <div class="section-signup__text">
            <h2 class="section-signup__title">{{content_title}}</h2>
            <p class="section-signup__subtitle">{{content_subtitle}}</p>
            <div class="section-signup__body">{{{text_paragraphs_html}}}</div>
        </div>
        <ul class="section-signup__points">
            {{{items_html}}}
        </ul>
    </div>
</section>
