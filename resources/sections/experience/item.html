<figure class="section-experience__card">
    <blockquote class="section-experience__quote"><p>{{text}}</p></blockquote>
    <figcaption class="section-experience__author">
        <span class="section-experience__avatar" aria-hidden="true">{{initials}}</span>
        <span class="section-experience__meta">
            <span class="section-experience__name">{{title}}</span>
            <span class="section-experience__role">{{role}}</span>
        </span>
    </figcaption>
</figure>
