<figure class="section-testimonials__card">
    <blockquote class="section-testimonials__quote"><p>{{text}}</p></blockquote>
    <figcaption class="section-testimonials__author">
        <span class="section-testimonials__avatar" aria-hidden="true">{{initials}}</span>
        <span class="section-testimonials__meta">
            <span class="section-testimonials__name">{{title}}</span>
            <span class="section-testimonials__role">{{role}}</span>
        </span>
    </figcaption>
</figure>
