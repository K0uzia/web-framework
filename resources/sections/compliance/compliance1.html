<section class="section-compliance section-compliance--compliance1 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-compliance__container--compliance1">
        <div class="section-compliance__layout--compliance1">
            <div class="section-compliance__intro--compliance1">
                <p class="section-compliance__status--compliance1">
                    <span class="section-compliance__status-dot--compliance1" aria-hidden="true"></span>
                    {{content_tagline}}
                </p>
                <h2 class="section-compliance__title--compliance1">{{content_title}}</h2>
                <p class="section-compliance__description--compliance1">{{content_text}}</p>
                <div class="section-compliance__logos--compliance1">
                    {{{compliance_logos_html}}}
                </div>
            </div>
            <div class="section-compliance__panel--compliance1">
                {{{compliance_features_html}}}
            </div>
        </div>
    </div>
</section>
