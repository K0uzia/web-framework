<section class="section-demo section-demo--{{variant}} section--align-{{style_text_align}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-demo__inner section-demo__inner--split">
        <div class="section-demo__copy">
            <h1>{{content_title}}</h1>
            <p class="section-demo__subtitle">{{content_subtitle}}</p>
            <div class="section-buttons">{{{buttons_html}}}</div>
        </div>
        <div class="section-demo__visual">{{{hero_visual_html}}}</div>
    </div>
</section>
