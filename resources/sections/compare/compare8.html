<section class="section-compare section-compare--compare8 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-compare__container--compare8">
        <h2 class="section-compare__title--compare8">{{content_title}}</h2>
        <p class="section-compare__subtitle--compare8">{{content_subtitle}}</p>
        <div class="section-compare__panel--compare8">
            <div class="section-compare__panel-head--compare8" aria-hidden="true">
                <div class="section-compare__head-icon--compare8"></div>
                <div class="section-compare__head-feature--compare8">Fonctionnalité</div>
                <div class="section-compare__head-col--compare8">{{content_primary_label}}</div>
                <div class="section-compare__head-col--compare8">{{content_secondary_label}}</div>
            </div>
            {{{compare_rows_html}}}
        </div>
    </div>
</section>
