<section class="section-compare section-compare--compare7 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-compare__container--compare7">
        <h2 class="section-compare__title--compare7">{{content_title}}</h2>
        <p class="section-compare__subtitle--compare7">{{content_subtitle}}</p>
        <div class="section-compare__table-wrap--compare7">
            <table class="section-compare__table--compare7">
                <thead>
                    <tr>
                        <th scope="col" class="section-compare__head--compare7">Fonctionnalité</th>
                        <th scope="col" class="section-compare__head--compare7 section-compare__head--primary--compare7">{{content_primary_label}}</th>
                        <th scope="col" class="section-compare__head--compare7">{{content_secondary_label}}</th>
                    </tr>
                </thead>
                <tbody>
                    {{{compare_rows_html}}}
                </tbody>
            </table>
        </div>
    </div>
</section>
