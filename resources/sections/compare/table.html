<section class="section-compare section-compare--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner">
        {{{head_html}}}
        <div class="section-compare__table" role="table">
            <div class="section-compare__head" role="row">
                <span class="section-compare__corner" role="columnheader"></span>
                <span class="section-compare__col" role="columnheader">{{content_col_a_label}}</span>
                <span class="section-compare__col" role="columnheader">{{content_col_b_label}}</span>
            </div>
            <div class="section-compare__body">
                {{{items_html}}}
            </div>
        </div>
    </div>
</section>
