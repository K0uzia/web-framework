<article class="section-features__item">
    <span class="section-features__index" aria-hidden="true">{{index_padded}}</span>
    <div class="section-features__icon-wrap" aria-hidden="true">
        <i class="{{icon_class}}" aria-hidden="true"></i>
    </div>
    <div class="section-features__body">
        <h3 class="section-features__title">{{title}}</h3>
        <p class="section-features__text">{{text}}</p>
    </div>
</article>
