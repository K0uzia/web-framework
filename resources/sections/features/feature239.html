<section class="section-features section-features--feature239 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-features__container section-features__container--dotted">
        <div class="section-features__dotted-frame section-features__dotted-frame--outer">
            <span class="section-features__dotted-line section-features__dotted-line--h-top" aria-hidden="true"></span>
            <span class="section-features__dotted-line section-features__dotted-line--h-bottom" aria-hidden="true"></span>
            <span class="section-features__dotted-line section-features__dotted-line--v-left" aria-hidden="true"></span>
            <span class="section-features__dotted-line section-features__dotted-line--v-right" aria-hidden="true"></span>
            <span class="section-features__dotted-corner section-features__dotted-corner--tl" aria-hidden="true"></span>
            <span class="section-features__dotted-corner section-features__dotted-corner--tr" aria-hidden="true"></span>
            <span class="section-features__dotted-corner section-features__dotted-corner--bl" aria-hidden="true"></span>
            <span class="section-features__dotted-corner section-features__dotted-corner--br" aria-hidden="true"></span>
            <div class="section-features__split">
                <div class="section-features__copy section-features__copy--padded">
                    {{{feature_badge_html}}}
                    <h2 class="section-features__title section-features__title--display">{{{feature_title_html}}}</h2>
                    <p class="section-features__subtitle section-features__subtitle--lg">{{content_subtitle}}</p>
                    <div class="section-features__buttons">{{{feature_buttons_html}}}</div>
                </div>
                <div class="section-features__dotted-visual section-features__dotted-frame--inner">
                    <span class="section-features__dotted-line section-features__dotted-line--h-top" aria-hidden="true"></span>
                    <span class="section-features__dotted-line section-features__dotted-line--h-bottom" aria-hidden="true"></span>
                    <span class="section-features__dotted-line section-features__dotted-line--v-left" aria-hidden="true"></span>
                    <span class="section-features__dotted-line section-features__dotted-line--v-right" aria-hidden="true"></span>
                    <span class="section-features__dotted-corner section-features__dotted-corner--tl" aria-hidden="true"></span>
                    <span class="section-features__dotted-corner section-features__dotted-corner--tr" aria-hidden="true"></span>
                    <span class="section-features__dotted-corner section-features__dotted-corner--bl" aria-hidden="true"></span>
                    <span class="section-features__dotted-corner section-features__dotted-corner--br" aria-hidden="true"></span>
                    <div class="section-features__visual-wrap">
                        <div class="section-features__visual-inner">
                            {{{feature_visual_html}}}
                            <span class="section-features__visual-gradient" aria-hidden="true"></span>
                        </div>
                        {{{feature_overlay_html}}}
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
