<article class="section-features__item{{featured_class}}">
    <div class="section-features__icon-wrap" aria-hidden="true">
        <i class="{{icon_class}}" aria-hidden="true"></i>
    </div>
    <div class="section-features__item-body">
        <h3 class="section-features__item-title">{{title}}</h3>
        <p class="section-features__item-text">{{text}}</p>
    </div>
    <div class="section-features__item-media">{{{image_html}}}</div>
</article>
