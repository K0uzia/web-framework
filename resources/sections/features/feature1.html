<section class="section-features section-features--feature1 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-features__container">
        <div class="section-features__split">
            <div class="section-features__copy section-features__copy--center-mobile">
                <h2 class="section-features__title">{{content_title}}</h2>
                <p class="section-features__subtitle">{{content_subtitle}}</p>
                <div class="section-features__buttons">{{{feature_buttons_html}}}</div>
            </div>
            <div class="section-features__visual">{{{feature_visual_html}}}</div>
        </div>
    </div>
</section>
