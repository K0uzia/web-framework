<section class="section-features section-features--feature-1 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner">
        <div class="section-features__split section-features__split--text-first">
            <div class="section-features__copy section-features__copy--centered-mobile">
                <h2 class="section-features__title">{{content_title}}</h2>
                <p class="section-features__lead">{{content_subtitle}}</p>
                <div class="section-buttons">{{{buttons_html}}}</div>
            </div>
            <div class="section-features__visual">{{{feature_image_html}}}</div>
        </div>
    </div>
</section>
