<section class="section-features section-features--feature72 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-features__container">
        <header class="section-features__header section-features__header--side">
            <h2 class="section-features__title">{{content_title}}</h2>
            <p class="section-features__subtitle">{{content_subtitle}}</p>
            <div class="section-features__buttons">{{{feature_buttons_html}}}</div>
        </header>
        <div class="section-features__grid section-features__grid--image-2">{{{feature_items_html}}}</div>
    </div>
</section>
