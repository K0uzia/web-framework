<section class="section-code section-code--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-code__grid">
        <div class="section-code__text">
            <h2 class="section-code__title">{{content_title}}</h2>
            <p class="section-code__subtitle">{{content_subtitle}}</p>
            <div class="section-code__body">{{{text_paragraphs_html}}}</div>
        </div>
        <ul class="section-code__points">
            {{{items_html}}}
        </ul>
    </div>
</section>
