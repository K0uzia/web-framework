<section class="section-code section-code--codeexample1 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-code__container--codeexample1">
        <div class="section-code__layout--codeexample1">
            <div class="section-code__content--codeexample1">
                <p class="section-code__tagline--codeexample1">{{content_tagline}}</p>
                <h2 class="section-code__title--codeexample1">
                    {{content_title}}<br />
                    <span class="section-code__highlight--codeexample1">{{content_subtitle}}</span>
                </h2>
                <p class="section-code__description--codeexample1">{{content_text}}</p>
                <div class="section-code__buttons--codeexample1">
                    {{{buttons_html}}}
                </div>
            </div>
            <div class="section-code__aside--codeexample1">
                {{{code_panel_html}}}
            </div>
        </div>
    </div>
</section>
