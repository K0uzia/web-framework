<section class="section-newsletter section-newsletter--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-newsletter__grid">
        <div class="section-newsletter__text">
            <h2 class="section-newsletter__title">{{content_title}}</h2>
            <p class="section-newsletter__subtitle">{{content_subtitle}}</p>
            <div class="section-newsletter__body">{{{text_paragraphs_html}}}</div>
        </div>
        <ul class="section-newsletter__points">
            {{{items_html}}}
        </ul>
    </div>
</section>
