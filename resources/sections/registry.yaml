hero:
  label: Hero
  group: hero
  icon: fa-solid fa-panorama
  description: 'Bibliothèque de 13 blocs hero pour pages d''accueil et landing.'
  variants:
    hero1:
      label: Hero 1
      description: 'Split avec badge et image clair/sombre.'
    hero3:
      label: Hero 3
      description: 'Split avec avis, note et visuel clair/sombre.'
    hero7:
      label: Hero 7
      description: 'Preuve sociale centrée avec avatars.'
    hero12:
      label: Hero 12
      description: 'Logo, fond quadrillé et stack technique.'
    hero34:
      label: Hero 34
      description: 'Split sur carte à fond atténué.'
    hero45:
      label: Hero 45
      description: 'Slider d''images et fonctionnalités.'
    hero47:
      label: Hero 47
      description: 'Titre large et mockup téléphone.'
    hero67:
      label: Hero 67
      description: 'Logo, CTA, avatars et bandeau image.'
    hero78:
      label: Hero 78
      description: 'Plein écran avec photo de fond.'
    hero115:
      label: Hero 115
      description: 'Cercles décoratifs, icône et image.'
    hero195:
      label: Hero 195
      description: 'Onglets produit avec visuels.'
    hero206:
      label: Hero 206
      description: 'Marquee de logos et mockup navigateur.'
    hero243:
      label: Hero 243
      description: 'Titre animé et grille de fonctionnalités.'
  content_fields:
    title:
      type: text
      label: Titre
      client_editable: true
    subtitle:
      type: textarea
      label: Description
      client_editable: true
    subheading:
      type: text
      label: Sous-titre (partie secondaire)
      client_editable: true
    badge:
      type: text
      label: Badge
      client_editable: true
    byline:
      type: text
      label: Ligne de confiance
      client_editable: true
    image_url:
      type: image
      label: Image (mode clair)
      client_editable: true
    image_url_dark:
      type: image
      label: Image (mode sombre)
      client_editable: true
    image_alt:
      type: text
      label: Texte alternatif image
      client_editable: true
    background_image_url:
      type: image
      label: Image de fond
      client_editable: true
    reviews_rating:
      type: text
      label: Note affichée
      client_editable: true
    reviews_count:
      type: text
      label: Nombre d''avis
      client_editable: true
    review_avatars:
      type: repeater
      label: Avatars des avis
      fields:
        url:
          type: image
          label: Photo
        title:
          type: text
          label: Nom (accessibilité)
    buttons:
      type: buttons
      label: Boutons
      client_editable: true
    items:
      type: repeater
      label: Éléments (onglets, features, logos)
      fields:
        title:
          type: text
          label: Titre
        text:
          type: textarea
          label: Description
        url:
          type: image
          label: Image
        href:
          type: text
          label: Lien
  style_fields:
    bg:
      type: color-token
      label: Fond
      group: general
    padding:
      type: select
      label: Espacement vertical
      options: '[sm, md, lg, xl]'
      group: general
