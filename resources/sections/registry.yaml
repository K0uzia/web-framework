      type: text
      label: Titre
      client_editable: true
    subtitle:
      type: textarea
      label: Description
      client_editable: true
    subheading:
      type: text
      label: Sous-titre (partie secondaire)
      client_editable: true
    badge:
      type: text
      label: Badge
      client_editable: true
    byline:
      type: text
      label: Ligne de confiance
      client_editable: true
    image_url:
      type: image
      label: Image (mode clair)
      client_editable: true
    image_url_dark:
      type: image
      label: Image (mode sombre)
      client_editable: true
    image_alt:
      type: text
      label: Texte alternatif image
      client_editable: true
    background_type:
      type: select
      label: Type de fond
      options: '[image,video,shader]'
      group: background
      client_editable: true
    background_image_url:
      type: image
      label: Image de fond
      group: background
      client_editable: true
    background_video_url:
      type: video
      label: Vidéo de fond
      group: background
      client_editable: true
