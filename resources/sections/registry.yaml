      type: shader
      label: Shader de fond
      group: background
      client_editable: true
    background_shader_color:
      type: text
      label: Couleur accent shader
      group: background
      client_editable: true
    reviews_rating:
      type: text
      label: Note affichée
      client_editable: true
    reviews_count:
      type: text
      label: Nombre d'avis
      client_editable: true
    review_avatars:
      type: repeater
      label: Avatars des avis
      fields:
        url:
          type: image
          label: Photo
        title:
          type: text
          label: Nom (accessibilité)
    buttons:
      type: buttons
      label: Boutons
      client_editable: true
    mockup_url:
      type: url
      label: URL du mockup navigateur
      client_editable: true
    flip_words:
      type: textarea
      label: Mots animés, un par ligne
      client_editable: true
    items:
      type: repeater
      label: 'Éléments (onglets, features, logos)'
      fields:
        title:
          type: text
          label: Titre
        text:
          type: textarea
          label: Description
        url:
          type: image
          label: Image
        href:
          type: text
          label: Lien
  style_fields:
    min_height:
      type: select
      label: Hauteur minimale
      options: '[auto, large, viewport]'
      group: layout
    content_width:
      type: select
      label: Largeur du contenu
      options: '[narrow, default, wide]'
      group: layout
  default_variant: hero3
