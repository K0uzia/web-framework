<article class="section-projects__card">
    {{{media_link_open}}}
        {{{image_html}}}
        <span class="section-projects__overlay" aria-hidden="true">
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </span>
    {{{media_link_close}}}
    <div class="section-projects__body">
        {{{meta_html}}}
        <h3 class="section-projects__title">{{{title_linked_html}}}</h3>
        <p class="section-projects__excerpt">{{text}}</p>
    </div>
</article>
