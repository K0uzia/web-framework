<section class="section-ui-rating section-ui-rating--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-inner--narrow">
        <div class="section-ui-rating__inner">
            <span class="section-ui-rating__stars" aria-hidden="true"><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star-half-stroke"></i></span>
            <strong class="section-ui-rating__value">{{content_title}}</strong>
            <span class="section-ui-rating__label">{{content_subtitle}}</span>
        </div>
    </div>
</section>
