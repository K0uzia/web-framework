<section class="section-ui-rating section-ui-rating--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-inner--narrow">
        <div class="section-ui-rating__row" aria-label="{{content_title}}">
            <span class="section-ui-rating__stars" aria-hidden="true">{{content_stars}}</span>
            <span class="section-ui-rating__label">{{content_subtitle}}</span>
        </div>
    </div>
</section>
