<section class="section-about section-about--{{variant}} section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-inner section-about__grid">
        <div class="section-about__text">
            <h2 class="section-about__title">{{content_title}}</h2>
            <p class="section-about__subtitle">{{content_subtitle}}</p>
            <div class="section-about__body">{{{text_paragraphs_html}}}</div>
        </div>
        <ul class="section-about__points">
            {{{items_html}}}
        </ul>
    </div>
</section>
