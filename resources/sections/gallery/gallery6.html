<section class="section-gallery section-gallery--gallery6 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-gallery__container">
        <div class="section-gallery__head section-gallery__head--gallery6">
            <div class="section-gallery__intro">
                <h2 class="section-gallery__title">{{content_title}}</h2>
                <a href="{{content_demo_href}}" class="section-gallery__demo-link">{{content_demo_label}} <i class="fa-solid fa-arrow-up-right" aria-hidden="true"></i></a>
            </div>
            {{{gallery_nav_html}}}
        </div>
    </div>
    <div class="section-gallery__carousel-wrap section-gallery__carousel-wrap--gallery6" data-gallery-carousel data-gallery-id="{{section_id}}">
        <div class="section-gallery__track section-gallery__track--gallery6" data-gallery-track>
            {{{gallery_slides_html}}}
        </div>
    </div>
</section>
