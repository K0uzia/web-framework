<section class="section-gallery section-gallery--gallery6 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-gallery__container--gallery6">
        <div class="section-gallery__head--gallery6">
            <div class="section-gallery__intro--gallery6">
                <h2 class="section-gallery__title--gallery6">{{content_title}}</h2>
                <a href="{{content_demo_href}}" class="section-gallery__demo-link--gallery6">{{content_demo_label}} <i class="fa-solid fa-arrow-up-right" aria-hidden="true"></i></a>
            </div>
            {{{gallery_nav_html}}}
        </div>
    </div>
    <div class="section-gallery__stage--gallery6">
        <div class="section-gallery__viewport--gallery6" data-gallery-carousel data-gallery-track data-gallery-id="{{section_id}}">
            <div class="section-gallery__track--gallery6">
                {{{gallery_slides_html}}}
            </div>
        </div>
    </div>
</section>
