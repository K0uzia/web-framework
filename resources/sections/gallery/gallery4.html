<section class="section-gallery section-gallery--gallery4 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">
    <div class="section-gallery__container section-gallery__container--gallery4">
        <div class="section-gallery__head section-gallery__head--gallery4">
            <div class="section-gallery__intro section-gallery__intro--gallery4">
                <h2 class="section-gallery__title section-gallery__title--gallery4">{{content_title}}</h2>
                <p class="section-gallery__subtitle section-gallery__subtitle--gallery4">{{content_subtitle}}</p>
            </div>
            {{{gallery_nav_html}}}
        </div>
    </div>
    <div class="section-gallery__stage section-gallery__stage--gallery4">
        <div class="section-gallery__viewport section-gallery__viewport--gallery4" data-gallery-carousel data-gallery-track data-gallery-id="{{section_id}}">
            <div class="section-gallery__track section-gallery__track--gallery4">
                {{{gallery_slides_html}}}
            </div>
        </div>
        <div class="section-gallery__dots section-gallery__dots--gallery4" data-gallery-dots>
            {{{gallery_dots_html}}}
        </div>
    </div>
</section>
