<section class="section-stats section-stats--stats8 section--pad-{{style_padding}} section--bg-{{style_bg}}" id="{{section_id}}">

        <div class="section-stats__head--stats8">
            <h2 class="section-stats__title--stats8">{{content_title}}</h2>

        <div class="section-stats__grid--stats8">
            {{{stats_items_html}}}
        </div>
    </div>
</section>
