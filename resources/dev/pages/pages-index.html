<div class="dev-pages">
    <div class="dev-page-head">
        <div>
            <h1><i class="fa-solid fa-file-lines" aria-hidden="true"></i> Pages</h1>
            <p class="dev-lead">{{pages_count}} page(s) dans ce site.</p>
        </div>
        <div class="dev-page-head__actions">
            <button type="button" class="dev-button" data-dev-modal-open="dev-page-new">
                <i class="fa-solid fa-plus" aria-hidden="true"></i> Nouvelle page
            </button>
        </div>
    </div>

    <div class="dev-table-toolbar">
        <div class="dev-search">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <input type="text" class="dev-input" id="dev-pages-search" placeholder="Rechercher une page..." aria-label="Rechercher une page" />
        </div>
    </div>

    <p class="dev-empty {{empty_class}}" id="dev-pages-empty">
        <i class="fa-solid fa-file-circle-plus" aria-hidden="true"></i>
        Aucune page pour le moment.
        <button type="button" class="dev-button dev-button--ghost" data-dev-modal-open="dev-page-new">Créer votre première page</button>
    </p>

    <div class="dev-table-wrap {{table_class}}" id="dev-pages-table-wrap">
        <table class="dev-table">
            <thead>
                <tr>
                    <th scope="col">Page</th>
                    <th scope="col">Statut</th>
                    <th scope="col">Mise à jour</th>
                    <th scope="col"><span class="visually-hidden">Actions</span></th>
                </tr>
            </thead>
            <tbody id="dev-pages-rows">
                {{{rows_html}}}
            </tbody>
        </table>
    </div>
    <p class="dev-empty visually-hidden" id="dev-pages-no-match">
        <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
        Aucune page ne correspond à votre recherche.
    </p>
</div>

<div class="dev-modal" id="dev-page-new" hidden>
    <button type="button" class="dev-modal__backdrop" data-dev-modal-close="dev-page-new" tabindex="-1" aria-hidden="true"></button>
    <div class="dev-block-picker__panel dev-modal__panel--form" role="dialog" aria-modal="true" aria-labelledby="dev-page-new-title">
        <div class="dev-block-picker__head">
            <h2 id="dev-page-new-title">Nouvelle page</h2>
            <button type="button" class="dev-icon-btn" data-dev-modal-close="dev-page-new" aria-label="Fermer"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
        </div>
        <div class="dev-modal__body">
            <p class="dev-panel__desc">Choisissez un modèle ou partez d'une page vide, puis ajoutez des blocs dans l'éditeur.</p>
            {{> page-new-form.html}}
        </div>
    </div>
</div>

<script src="/assets/js/dev-pages-index.js" defer></script>
