<form method="post" action="/dev/pages" id="dev-page-new-form" class="dev-form dev-form--grid dev-form--grid-2" data-dev-ajax="post-redirect" data-dev-toast-form="Page créée en brouillon" novalidate>
    <input type="hidden" name="page_template" id="dev-new-page-template" value="blank" />
    <script type="application/json" id="dev-page-template-presets">{{{page_template_presets_json}}}</script>

    <div class="dev-field dev-form__full">
        <span class="dev-label">Modèle de page</span>
        <span class="dev-hint" id="dev-new-page-template-hint">Choisissez une composition de blocs. Les modèles sont publiés automatiquement.</span>
        {{{page_template_picker_html}}}
    </div>

    <div class="dev-field">
        <label class="dev-label" for="dev-new-page-title">Titre</label>
        <input class="dev-input" id="dev-new-page-title" type="text" name="title" placeholder="À propos" autocomplete="off" />
    </div>
    <div class="dev-field">
        <label class="dev-label" for="dev-new-page-slug">Adresse <span class="dev-hint">(vide = accueil /)</span></label>
        <input class="dev-input" id="dev-new-page-slug" type="text" name="slug" placeholder="a-propos" autocomplete="off" inputmode="url" />
        <span class="dev-hint">Lettres minuscules et tirets. Laissez vide pour la page d'accueil.</span>
    </div>
    <div class="dev-field dev-form__full">
        <label class="dev-label" for="dev-new-page-layout">Gabarit</label>
        <select class="dev-input dev-select" id="dev-new-page-layout" name="layout">
            {{{layout_options}}}
        </select>
    </div>
    <div class="dev-field dev-form__full">
        <label class="dev-label" for="dev-new-page-description">Description (SEO)</label>
        <input class="dev-input" id="dev-new-page-description" type="text" name="description" placeholder="Meta description pour les moteurs de recherche" autocomplete="off" />
    </div>
    <div class="dev-form__full dev-form__actions">
        <button type="submit" class="dev-button"><i class="fa-solid fa-check" aria-hidden="true"></i> Créer la page</button>
        <button type="button" class="dev-button dev-button--ghost" data-dev-modal-close="dev-page-new">Annuler</button>
    </div>
</form>
