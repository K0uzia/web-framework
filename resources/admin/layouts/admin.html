<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="capsule-base-path" content="{{base_path}}" />
    <title>{{title}} - {{site_name}}</title>
    <script src="{{asset_root}}/assets/js/dev-base-path.js"></script>
    {{{favicon_html}}}
    <link rel="stylesheet" href="{{asset_root}}/assets/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="{{asset_root}}/assets/css/admin.css" />
    {{{theme_css}}}
</head>
<body class="admin-shell">
    <a class="admin-skip" href="#admin-main">Aller au contenu</a>
    <div class="admin-app" data-admin-app>
        <button type="button" class="admin-nav-backdrop" data-admin-sidebar-close tabindex="-1" aria-hidden="true" hidden></button>

        <aside class="admin-nav" id="admin-sidebar" aria-label="Navigation">
            <a class="admin-nav__brand" href="/admin/pages">
                {{{logo_html}}}
                <span class="admin-nav__brand-text">
                    <span class="admin-nav__site">{{site_name}}</span>
                    <span class="admin-nav__role">Espace client</span>
                </span>
            </a>

            <nav class="admin-nav__menu">
                <a href="/admin/home" class="admin-nav__link {{nav_active_home}}"{{{nav_aria_home}}}>
                    <span class="admin-nav__icon" aria-hidden="true"><i class="fa-solid fa-gauge-high"></i></span>
                    <span class="admin-nav__label">Tableau de bord</span>
                </a>

                <p class="admin-nav__group">Bibliothèque</p>
                <a href="/admin/site" class="admin-nav__link {{nav_active_site}} {{nav_site_hidden}}"{{{nav_aria_site}}}>
                    <span class="admin-nav__icon" aria-hidden="true"><i class="fa-solid fa-id-card"></i></span>
                    <span class="admin-nav__label">Identité</span>
                </a>
                <a href="/admin/pages" class="admin-nav__link {{nav_active_pages}}"{{{nav_aria_pages}}}>
                    <span class="admin-nav__icon" aria-hidden="true"><i class="fa-solid fa-layer-group"></i></span>
                    <span class="admin-nav__label">Pages</span>
                </a>
                <a href="/admin/medias" class="admin-nav__link {{nav_active_medias}} {{nav_medias_hidden}}"{{{nav_aria_medias}}}>
                    <span class="admin-nav__icon" aria-hidden="true"><i class="fa-solid fa-photo-film"></i></span>
                    <span class="admin-nav__label">Médias</span>
                </a>
            </nav>

            <div class="admin-nav__footer">
                <a href="/" class="admin-nav__link admin-nav__link--external" target="_blank" rel="noopener noreferrer">
                    <span class="admin-nav__icon" aria-hidden="true"><i class="fa-solid fa-arrow-up-right-from-square"></i></span>
                    <span class="admin-nav__label">Voir le site</span>
                </a>
                <form method="post" action="/admin/logout">
                    <button type="submit" class="admin-nav__link admin-nav__link--action">
                        <span class="admin-nav__icon" aria-hidden="true"><i class="fa-solid fa-right-from-bracket"></i></span>
                        <span class="admin-nav__label">Déconnexion</span>
                    </button>
                </form>
            </div>
        </aside>

        <div class="admin-workspace">
            <header class="admin-topbar">
                <button type="button" class="admin-icon-btn admin-topbar__menu" data-admin-sidebar-open aria-controls="admin-sidebar" aria-expanded="false" aria-label="Ouvrir le menu">
                    <i class="fa-solid fa-bars" aria-hidden="true"></i>
                </button>
                <div class="admin-topbar__main">
                    <p class="admin-topbar__crumb">Espace client</p>
                    <h1 class="admin-topbar__title">{{title}}</h1>
                </div>
                <div class="admin-topbar__actions">
                    <a class="admin-btn admin-btn--soft" href="/" target="_blank" rel="noopener noreferrer">
                        <i class="fa-solid fa-eye" aria-hidden="true"></i>
                        <span>Site public</span>
                    </a>
                </div>
            </header>

            <main id="admin-main" class="admin-main {{main_class}}">
                {{{content}}}
            </main>
        </div>
    </div>
    <script src="{{asset_root}}/assets/js/admin-shell.js" defer></script>
</body>
</html>
