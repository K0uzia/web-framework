# Netlify sert des fichiers statiques à l'exécution (pas de PHP runtime).
# Le build PHP ci-dessous génère le HTML ; pour le panel /dev fonctionnel,
# déployez aussi l'app PHP sur Render (render.yaml) puis définissez :
#   PHP_APP_URL = https://votre-app.onrender.com
# dans Site configuration → Environment variables.

[build]
  command = "bash scripts/netlify-build.sh"
  publish = "dist"

[build.environment]
  NETLIFY = "true"
  APP_ENV = "prod"
  APP_HTTPS = "1"

[context.deploy-preview]
  command = "bash scripts/netlify-build.sh"

[context.branch-deploy]
  command = "bash scripts/netlify-build.sh"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/dev/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
