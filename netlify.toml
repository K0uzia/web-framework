# Déploiement CapsulePHP sur Netlify (export HTML statique).
# Connectez le dépôt GitHub dans Netlify : Site configuration → Build & deploy.

[build]
  command = "bash scripts/netlify-build.sh"
  publish = "dist"

[build.environment]
  NETLIFY = "true"
  APP_ENV = "prod"
  APP_HTTPS = "1"

# Aperçus de PR : URL de preview injectée automatiquement par Netlify (DEPLOY_PRIME_URL).
[context.deploy-preview]
  command = "bash scripts/netlify-build.sh"

[context.branch-deploy]
  command = "bash scripts/netlify-build.sh"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/dev/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
