# Backend PHP complet (panel /dev, API, pages dynamiques).
# Créez un Web Service sur Render en important ce dépôt (runtime: Docker).
# Puis reliez Netlify via PHP_APP_URL = URL Render.

services:
  - type: web
    name: web-framework
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_HTTPS
        value: "1"
      - key: APP_URL
        sync: false
      - key: DEV_PASSWORD
        sync: false
    disk:
      name: capsule-data
      mountPath: /app/data
      sizeGB: 1
